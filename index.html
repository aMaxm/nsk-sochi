<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#060912" />
  <title>Максим — Пешком из Новосибирска в Сочи</title>
  <meta name="description" content="Максим идет пешком из Новосибирска в Сочи и рассказывает о пути. Подписывайтесь и поддержите авантюру." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{
      --bg:#060912;
      --bg2:#0f172a;
      --line:rgba(255,255,255,.10);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --soft:#94a3b8;
      --accent:#8b5cf6;
      --accent2:#22c55e;
      --accent3:#38bdf8;
      --shadow:0 24px 80px rgba(0,0,0,.45)
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(139,92,246,.25), transparent 18%),
        radial-gradient(circle at 90% 12%, rgba(56,189,248,.14), transparent 16%),
        radial-gradient(circle at 50% 100%, rgba(34,197,94,.12), transparent 20%),
        linear-gradient(135deg,var(--bg),var(--bg2));
      min-height:100vh;
      padding:16px 16px 92px;
      overflow-x:hidden;
    }
    .shell{width:min(1040px,100%);margin:0 auto}
    .hero{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
    }
    .inner{padding:16px}
    .topbar{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--muted);
      font-size:13px
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent3),var(--accent2));
      box-shadow:0 0 18px rgba(56,189,248,.55)
    }
    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:14px;
      align-items:start
    }
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .panel{
      border:1px solid var(--line);
      border-radius:24px;
      background:rgba(0,0,0,.14)
    }
    .left{padding:18px}
    .right{padding:14px;display:grid;gap:12px}
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#ddd6fe;
      background:rgba(139,92,246,.12);
      border:1px solid rgba(139,92,246,.24);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      margin-bottom:14px;
      width:fit-content
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(28px,5vw,58px);
      line-height:1.02;
      letter-spacing:-.05em
    }
    .lead{
      margin:0 0 12px;
      font-size:clamp(15px,1.9vw,18px);
      line-height:1.6;
      color:var(--muted);
      max-width:44ch
    }
    .mapCard{
      padding:12px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      display:grid;
      gap:10px;
      margin-top:14px
    }
    .mapHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap
    }
    .mapTitle{font-weight:800}
    .mapSub{color:var(--soft);font-size:12px}
    .mapFrame{
      width:100%;
      min-height:260px;
      height:clamp(260px,38vw,380px);
      border-radius:14px;
      overflow:hidden;
      transform:translateZ(0)
    }
    .supportHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap
    }
    .supportHead h2{margin:0;font-size:18px}
    .supportHead span{color:var(--soft);font-size:12px}
    .supportCard{
      padding:14px;
      border-radius:18px;
      border:1px solid rgba(34,197,94,.22);
      background:linear-gradient(180deg, rgba(34,197,94,.10), rgba(255,255,255,.04));
      display:grid;
      gap:10px
    }
    .phone{
      font-size:clamp(22px,3.5vw,28px);
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.1;
      word-break:break-word
    }
    .bank{color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    button.copy,a.social,.sticky a{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      color:var(--text);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:46px;
      padding:0 14px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      transition:background .16s ease,transform .16s ease;
      font-weight:800
    }
    button.copy:hover,a.social:hover,.sticky a:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.12)
    }
    .copyFull{width:100%}
    .socials{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px
    }
    @media (max-width:560px){.socials{grid-template-columns:1fr}}
    a.social{
      min-height:60px;
      justify-content:space-between;
      padding:14px;
      border-radius:18px
    }
    .social .name{font-weight:900}
    .social .desc{color:var(--soft);font-size:12px;margin-top:2px;font-weight:500}
    .social .arrow{color:#c4b5fd;font-size:18px}
    .progress{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      display:grid;
      gap:8px
    }
    .progressTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap
    }
    .progressTop .label{font-weight:800}
    .progressTop .value{color:var(--muted);font-size:13px}
    .bar{
      width:100%;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08)
    }
    .bar>i{
      display:block;
      height:100%;
      width:48%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
      transition:width .3s ease
    }
    .sticky{
      position:fixed;
      left:0;
      right:0;
      bottom:12px;
      width:min(1040px,calc(100% - 24px));
      margin:0 auto;
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:20px;
      background:rgba(7,11,20,.80);
      border:1px solid var(--line);
      backdrop-filter:blur(14px);
      box-shadow:0 10px 35px rgba(0,0,0,.32);
      z-index:20;
      justify-content:center
    }
    .sticky a{
      flex:1 1 0;
      min-width:0;
      min-height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      font-weight:900
    }
    .sticky .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent3));
      border-color:transparent
    }
    .sticky .donat{background:rgba(255,255,255,.06)}
    @media (prefers-reduced-motion: reduce){
      *{animation:none !important;transition:none !important;scroll-behavior:auto !important}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="inner">
        <div class="topbar">
          <div class="chip"><span class="dot"></span> Путь, видео и живая история каждый день</div>
          <div class="chip" id="routeChip"></div>
        </div>

        <div class="grid">
          <section class="panel left">
            <div class="eyebrow">Идущий в закат.</div>
            <h1 id="title"></h1>
            <p class="lead" id="intro1"></p>
            <p class="lead" id="intro2"></p>

            <div class="mapCard" id="mapCard">
              <div class="mapHead">
                <div class="mapTitle">Карта пути</div>
                <div class="mapSub" id="mapSub"></div>
              </div>
              <div id="map" class="mapFrame"></div>
            </div>
          </section>

          <aside class="panel right">
            <div class="supportHead">
              <h2>Поддержать приключение</h2>
              <span>Быстро и удобно с телефона</span>
            </div>

            <div class="supportCard" id="supportBlock">
              <div class="phone" id="phone"></div>
              <div class="bank" id="bank"></div>
              <div class="row">
                <button class="copy copyFull" id="copyBtn" type="button">Скопировать номер</button>
              </div>
            </div>

            <div class="progress">
              <div class="progressTop">
                <div class="label">Прогресс пути</div>
                <div class="value" id="progressText"></div>
              </div>
              <div class="bar"><i id="progressFill"></i></div>
              <div class="value" id="progressNote"></div>
            </div>

            <div class="socials">
              <a class="social wide" id="tg" href="#" target="_blank" rel="noopener noreferrer">
                <div><div class="name">Telegram</div><div class="desc">Канал и связь</div></div>
                <div class="arrow">↗</div>
              </a>
              <a class="social" id="ig" href="#" target="_blank" rel="noopener noreferrer">
                <div><div class="name">Инста</div><div class="desc">Сторис и фото</div></div>
                <div class="arrow">↗</div>
              </a>
              <a class="social" id="max" href="#" target="_blank" rel="noopener noreferrer">
                <div><div class="name">Max</div><div class="desc">Новости</div></div>
                <div class="arrow">↗</div>
              </a>
              <a class="social" id="yt" href="#" target="_blank" rel="noopener noreferrer">
                <div><div class="name">YouTube</div><div class="desc">Видео</div></div>
                <div class="arrow">↗</div>
              </a>
              <a class="social wide" id="vk" href="#" target="_blank" rel="noopener noreferrer">
                <div><div class="name">Вконтакте</div><div class="desc">Сообщество</div></div>
                <div class="arrow">↗</div>
              </a>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div class="sticky" id="stickyPanel">
    <a class="primary centered" id="stickyTg" href="#" target="_blank" rel="noopener noreferrer">Телеграм</a>
    <a class="donat" href="https://pay.cloudtips.ru/p/6ee28d2f" target="_blank" rel="noopener noreferrer">Донат</a>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const data = {
      phone: '+7 903 999-37-78',
      tel: '+79039993778',
      bank: 'Тинькофф или Альфа-Банк',
      title: 'Иду пешком из Новосибирска в Сочи и рассказываю, что вижу по пути.',
      intro1: 'Меня зовут Максим, и я решил пройти этот путь своими ногами. Подписывайся на мои соцсети — посмотришь на это сумасшествие в режиме сериала.',
      intro2: 'Если тебе заходит этот формат и хочется поддержать авантюру, ниже есть номер для перевода и кнопки соцсетей.',
      route: 'Новосибирск → Сочи',
      progressWalked: 700,
      progressTotal: 5000,
      progressNote: 'Размял ноги!',
      currentCoords: '55.114944, 73.040372',
      currentPlace: 'вышел из Омска',
      mapZoom: 7,
      mapUrlLabel: 'Сейчас я:',
      instagram: 'https://www.instagram.com/max_with.axe?igsh=bzR3ZjUxeHVjM3o2',
      max: 'https://max.ru/join/-mFm-zJv_NyvI00oZNuhqrVzyemBKFloo9gY_Mk6cU8',
      youtube: 'https://youtube.com/@kotikilapkami?si=5LbQ4_q9oEJFHt6m',
      vk: 'https://vk.ru/club239438129',
      telegram: 'https://t.me/kotikilapkami'
    };

    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    };

    function parseCoords(input){
      const parts = String(input).split(',').map(s => s.trim()).filter(Boolean);
      if (parts.length !== 2) return null;
      const lat = Number(parts[0]);
      const lng = Number(parts[1]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return { lat, lng };
    }

    const coords = parseCoords(data.currentCoords) || { lat: 55.154644, lng: 75.709451 };

    setText('phone', data.phone);
    setText('bank', data.bank);
    setText('title', data.title);
    setText('intro1', data.intro1);
    setText('intro2', data.intro2);
    setText('routeChip', data.route);

    const percent = Math.max(0, Math.min(100, Math.round((data.progressWalked / data.progressTotal) * 100)));
    setText('progressText', `${data.progressWalked} км / ${data.progressTotal} км`);
    document.getElementById('progressFill').style.width = percent + '%';
    setText('progressNote', data.progressNote);
    setText('mapSub', `${data.mapUrlLabel}: ${data.currentPlace} · ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`);

    document.getElementById('ig').href = data.instagram;
    document.getElementById('max').href = data.max;
    document.getElementById('yt').href = data.youtube;
    document.getElementById('vk').href = data.vk;
    document.getElementById('tg').href = data.telegram;
    document.getElementById('stickyTg').href = data.telegram;

    const map = L.map('map', {
      scrollWheelZoom: false,
      doubleClickZoom: false,
      zoomControl: true,
      attributionControl: false,
      tap: false,
      touchZoom: true,
      boxZoom: false,
      keyboard: true,
      dragging: true,
      zoomAnimation: false,
      markerZoomAnimation: false,
      inertia: true,
      worldCopyJump: false,
      closePopupOnClick: false,
      trackResize: false
    }).setView([coords.lat, coords.lng], data.mapZoom);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      crossOrigin: true
    }).addTo(map);

    const marker = L.marker([coords.lat, coords.lng]).addTo(map).bindPopup(data.currentPlace);
    marker.openPopup();

    function resizeMap(){
      requestAnimationFrame(() => map.invalidateSize());
    }

    resizeMap();
    window.addEventListener('resize', () => resizeMap(), { passive:true });

    function setMapPoint(coordsString, place){
      const c = parseCoords(coordsString);
      if (!c) return false;
      data.currentCoords = coordsString;
      data.currentPlace = place;
      marker.setLatLng([c.lat, c.lng]);
      marker.setPopupContent(place);
      map.setView([c.lat, c.lng], data.mapZoom, { animate:false });
      setText('mapSub', `${data.mapUrlLabel}: ${place} · ${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`);
      setTimeout(() => resizeMap(), 50);
      return true;
    }

    window.setMapPoint = setMapPoint;
    window.setMapPointFromString = (coordsString, place) => setMapPoint(coordsString, place);

    async function copyPhone(){
      const text = data.tel;
      try{
        if (navigator.clipboard && window.isSecureContext){
          await navigator.clipboard.writeText(text);
        } else {
          const input = document.createElement('input');
          input.value = text;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
        }
        const btn = document.getElementById('copyBtn');
        const old = btn.textContent;
        btn.textContent = 'Скопировано';
        setTimeout(() => btn.textContent = old, 1400);
      } catch(e){
        const btn = document.getElementById('copyBtn');
        const old = btn.textContent;
        btn.textContent = 'Не удалось';
        setTimeout(() => btn.textContent = old, 1400);
      }
    }

    document.getElementById('copyBtn').addEventListener('click', copyPhone);

    const sticky = document.getElementById('stickyPanel');
    let lastScrollY = window.scrollY;
    let ticking = false;
    let hidden = false;

    function updateStickyVisibility(){
      const currentScrollY = window.scrollY;
      const delta = currentScrollY - lastScrollY;

      if (currentScrollY < 80){
        sticky.classList.remove('is-hidden');
        hidden = false;
      } else if (delta > 6 && !hidden){
        sticky.classList.add('is-hidden');
        hidden = true;
      } else if (delta < -6 && hidden){
        sticky.classList.remove('is-hidden');
        hidden = false;
      }

      lastScrollY = currentScrollY;
      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking){
        window.requestAnimationFrame(updateStickyVisibility);
        ticking = true;
      }
    }, { passive:true });

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      document.documentElement.style.scrollBehavior = 'auto';
    }
  </script>
</body>
</html>
