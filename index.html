<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#060912" />
  <title>Максим — Пешком из Новосибирска в Сочи</title>
  <meta name="description" content="Максим идет пешком из Новосибирска в Сочи и рассказывает о пути. Подписывайтесь и поддержите авантюру." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{
      --bg:#060912; --bg2:#0f172a;
      --line:rgba(255,255,255,.10); --text:#f8fafc;
      --muted:#cbd5e1; --soft:#94a3b8;
      --accent:#8b5cf6; --accent2:#22c55e; --accent3:#38bdf8;
      --shadow:0 24px 80px rgba(0,0,0,.45); --radius:30px;
    }

    /* Basic layout */
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(139,92,246,.25), transparent 18%),
        radial-gradient(circle at 90% 12%, rgba(56,189,248,.14), transparent 16%),
        radial-gradient(circle at 50% 100%, rgba(34,197,94,.12), transparent 20%),
        linear-gradient(135deg,var(--bg),var(--bg2));
      min-height:100vh; padding:16px 16px 92px; overflow-x:hidden;
    }
    .shell{width:min(1040px,100%); margin:0 auto}
    .hero{position:relative; overflow:hidden; border:1px solid var(--line); border-radius:36px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:var(--shadow); backdrop-filter:blur(18px); animation:rise .7s cubic-bezier(.2,.8,.2,1) both;}
    .inner{padding:20px}

    /* Chips/topbar */
    .topbar{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
    .chip{display:inline-flex; align-items:center; gap:10px; padding:10px 14px; border-radius:999px;
      border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--muted); font-size:14px;
      transition:transform .25s ease, background .25s ease; animation:fadeUp .7s both;}
    .chip:hover{transform:translateY(-1px)}
    .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));box-shadow:0 0 18px rgba(56,189,248,.55)}

    /* Grid */
    .grid{display:grid; grid-template-columns:1.15fr .85fr; gap:18px; align-items:start;}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}

    /* Panels */
    .panel{border:1px solid var(--line); border-radius:32px; background:rgba(0,0,0,.14); animation:fadeUp .8s both; will-change:transform,opacity;}
    .left{padding:24px} .right{padding:18px; display:grid; gap:14px;}

    /* Headings */
    .eyebrow{display:inline-flex;align-items:center;gap:8px;color:#ddd6fe;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.24);padding:8px 12px;border-radius:999px;font-size:13px;margin-bottom:16px;width:fit-content}
    h1{margin:0 0 14px;font-size:clamp(30px,5.2vw,64px);line-height:1;letter-spacing:-.05em;animation:fadeUp .85s both}
    .lead{margin:0 0 16px;font-size:clamp(16px,2vw,19px);line-height:1.65;color:var(--muted);max-width:44ch;animation:fadeUp .85s both}

    /* Map */
    .mapCard{padding:16px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.04);display:grid;gap:12px;margin-top:18px;animation:fadeUp .9s both}
    .mapHead{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .mapTitle{font-weight:800} .mapSub{color:var(--soft);font-size:13px}
    .mapFrame{width:100%; min-height:320px; height:clamp(320px,42vw,460px); border-radius:18px; overflow:hidden; transform:translateZ(0)}

    /* Support */
    .supportHead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .supportHead h2{margin:0;font-size:20px} .supportHead span{color:var(--soft);font-size:13px}
    .supportCard{padding:16px;border-radius:24px;border:1px solid rgba(34,197,94,.22);background:linear-gradient(180deg, rgba(34,197,94,.10), rgba(255,255,255,.04));display:grid;gap:10px}
    .phone{font-size:clamp(24px,4vw,30px);font-weight:900;letter-spacing:.2px;line-height:1.1;word-break:break-word}
    .bank{color:var(--muted)} .row{display:flex;gap:10px;flex-wrap:wrap}

    /* Buttons & socials */
    button.copy, a.social, .sticky a{appearance:none;border:none;cursor:pointer;text-decoration:none;color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:48px;padding:0 16px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid var(--line);transition:transform .18s ease, background .18s ease, border-color .18s ease, opacity .18s ease;font-weight:800}
    button.copy:hover, a.social:hover, .sticky a:hover{transform:translateY(-1px);background:rgba(255,255,255,.12)}
    .copyFull{width:100%}
    .socials{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:560px){.socials{grid-template-columns:1fr}}
    a.social{min-height:66px;justify-content:space-between;padding:16px;border-radius:20px}
    .social .name{font-weight:900} .social .desc{color:var(--soft);font-size:13px;margin-top:2px;font-weight:500} .social .arrow{color:#c4b5fd;font-size:20px}

    /* Progress */
    .progress{padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.04);display:grid;gap:10px}
    .progressTop{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .progressTop .label{font-weight:800} .progressTop .value{color:var(--muted);font-size:14px}
    .bar{width:100%;height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08)}
    .bar > i{display:block;height:100%;width:48%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));transition:width .35s ease}

    /* Sticky bottom panel */
    .sticky{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(1040px,calc(100% - 24px));display:flex;gap:10px;padding:10px;border-radius:22px;background:rgba(7,11,20,.76);border:1px solid var(--line);backdrop-filter:blur(16px);box-shadow:0 10px 35px rgba(0,0,0,.35);z-index:20;animation:fadeUp .8s both;transition:transform .28s ease, opacity .28s ease; will-change:transform,opacity}
    .sticky a{flex:1;min-height:48px;display:flex;align-items:center;justify-content:center;border-radius:16px;font-weight:900}
    .sticky .primary{background:linear-gradient(135deg,var(--accent),var(--accent3));border-color:transparent}
    .sticky .donat{background:rgba(255,255,255,.06)}
    .sticky .centered{text-align:center;justify-content:center}

    /* Hidden state (for scroll hide) */
    .sticky.is-hidden{transform:translateX(-50%) translateY(120%); opacity:0; pointer-events:none}

    /* Map fullscreen wrapper */
    .mapWrapFull{position:fixed !important; inset:0 !important; z-index:9999 !important; width:100vw !important; height:100vh !important; border-radius:0 !important; margin:0 !important; padding:0 !important; background:#060912}
    .mapWrapFull .mapFrame{width:100% !important; height:100vh !important; min-height:100vh !important; border-radius:0 !important}
    .mapClose{position:absolute;top:16px;right:16px;z-index:10000;display:none;align-items:center;justify-content:center;min-width:44px;height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(7,11,20,.82);color:var(--text);font-size:18px;font-weight:900;backdrop-filter:blur(14px);cursor:pointer}
    .mapWrapFull .mapClose{display:flex}
    .hint{position:absolute;left:16px;top:16px;z-index:10000;padding:8px 12px;border-radius:999px;background:rgba(7,11,20,.76);border:1px solid var(--line);color:var(--muted);font-size:12px;backdrop-filter:blur(14px);display:none}
    .mapWrapFull .hint{display:block}

    /* Glow / parallax */
    .glow{position:absolute;right:-120px;bottom:-140px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle, rgba(124,58,237,.24), transparent 65%);pointer-events:none;animation:pulse 7s ease-in-out infinite}
    .mapClose:active{transform:scale(.98)}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes pulse{0%,100%{transform:translate3d(0,0,0) scale(1);opacity:.85}50%{transform:translate3d(-10px,-8px,0) scale(1.06);opacity:1}}

    @media (prefers-reduced-motion: reduce){
      *{animation:none !important; transition:none !important; scroll-behavior:auto !important}
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="glow"></div>
      <div class="inner">
        <div class="topbar">
          <div class="chip"><span class="dot"></span> Путь, видео и живая история каждый день</div>
          <div class="chip" id="routeChip"></div>
        </div>

        <div class="grid">
          <section class="panel left">
            <div class="eyebrow">Идущий в закат.</div>
            <h1 id="title"></h1>
            <p class="lead" id="intro1"></p>
            <p class="lead" id="intro2"></p>

            <div class="mapCard" id="mapCard">
              <div class="mapHead">
                <div class="mapTitle">Карта пути</div>
                <div class="mapSub" id="mapSub"></div>
              </div>
              <div style="position:relative">
                <button class="mapClose" id="mapClose" type="button" aria-label="Закрыть карту">×</button>
                <div class="hint">Двойной тап — полный экран</div>
                <div id="map" class="mapFrame"></div>
              </div>
            </div>
          </section>

          <aside class="panel right">
            <div class="supportHead">
              <h2>Поддержать приключение</h2>
              <span>Быстро и удобно с телефона</span>
            </div>

            <div class="supportCard" id="supportBlock">
              <div class="phone" id="phone"></div>
              <div class="bank" id="bank"></div>
              <div class="row">
                <button class="copy copyFull" id="copyBtn" type="button">Скопировать номер</button>
              </div>
            </div>

            <div class="progress">
              <div class="progressTop">
                <div class="label">Прогресс пути</div>
                <div class="value" id="progressText"></div>
              </div>
              <div class="bar"><i id="progressFill"></i></div>
              <div class="value" id="progressNote"></div>
            </div>

            <div class="socials">
              <a class="social wide" id="tg" href="#" target="_blank" rel="noopener noreferrer"><div><div class="name">Telegram</div><div class="desc">Канал и связь</div></div><div class="arrow">↗</div></a>
              <a class="social" id="ig" href="#" target="_blank" rel="noopener noreferrer"><div><div class="name">Инста</div><div class="desc">Сторис и фото</div></div><div class="arrow">↗</div></a>
              <a class="social" id="max" href="#" target="_blank" rel="noopener noreferrer"><div><div class="name">Max</div><div class="desc">Новости</div></div><div class="arrow">↗</div></a>
              <a class="social" id="yt" href="#" target="_blank" rel="noopener noreferrer"><div><div class="name">YouTube</div><div class="desc">Видео</div></div><div class="arrow">↗</div></a>
              <a class="social wide" id="vk" href="#" target="_blank" rel="noopener noreferrer"><div><div class="name">Вконтакте</div><div class="desc">Сообщество</div></div><div class="arrow">↗</div></a>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div class="sticky" id="stickyPanel">
    <a class="primary centered" id="stickyTg" href="#" target="_blank" rel="noopener noreferrer">Телеграм</a>
    <a class="donat" href="#supportBlock">Донат</a>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* ============ Editable data block (easy to change from phone) ============ */
    const data = {
      phone: '+7 903 999-37-78',
      tel: '+79039993778',
      bank: 'Тинькофф или Альфа-Банк',
      title: 'Иду пешком из Новосибирска в Сочи и рассказываю, что вижу по пути.',
      intro1: 'Меня зовут Максим, и я решил пройти этот путь своими ногами. Подписывайся на мои соцсети — посмотришь на это сумасшествие в режиме сериала.',
      intro2: 'Если тебе заходит этот формат и хочется поддержать авантюру, ниже есть номер для перевода и кнопки соцсетей.',
      route: 'Новосибирск → Сочи',
      progressWalked: 360,
      progressTotal: 4500,
      progressNote: 'Почти размял ноги!',
      mapSub: 'Текущая точка автоматически берется из данных ниже',
      currentLat: 55.312079,
      currentLng: 77.131557,
      currentPlace: 'рядом с аулом Кошкуль',
      mapZoom: 6,
      mapUrlLabel: 'Где сейчас:',
      instagram: 'https://www.instagram.com/max_with.axe?igsh=bzR3ZjUxeHVjM3o2',
      max: 'https://max.ru/join/-mFm-zJv_NyvI00oZNuhqrVzyemBKFloo9gY_Mk6cU8',
      youtube: 'https://youtube.com/@kotikilapkami?si=5LbQ4_q9oEJFHt6m',
      vk: 'https://vk.ru/club239438129',
      telegram: 'https://t.me/kotikilapkami'
    };

    /* ============ Small helpers ============ */
    const setText = (id, value) => { const el = document.getElementById(id); if (el) el.textContent = value; };

    setText('phone', data.phone);
    setText('bank', data.bank);
    setText('title', data.title);
    setText('intro1', data.intro1);
    setText('intro2', data.intro2);
    setText('routeChip', data.route);

    const percent = Math.max(0, Math.min(100, Math.round((data.progressWalked / data.progressTotal) * 100)));
    setText('progressText', `${data.progressWalked} км / ${data.progressTotal} км`);
    const fill = document.getElementById('progressFill'); if (fill) fill.style.width = percent + '%';
    setText('progressNote', data.progressNote);
    setText('mapSub', `${data.mapUrlLabel}: ${data.currentPlace} · ${data.currentLat.toFixed(5)}, ${data.currentLng.toFixed(5)}`);

    document.getElementById('ig').href = data.instagram;
    document.getElementById('max').href = data.max;
    document.getElementById('yt').href = data.youtube;
    document.getElementById('vk').href = data.vk;
    document.getElementById('tg').href = data.telegram;
    document.getElementById('stickyTg').href = data.telegram;

    /* ============ Leaflet map init ============ */
    const mapCard = document.getElementById('mapCard');
    const map = L.map('map', { scrollWheelZoom: false, doubleClickZoom: false }).setView([data.currentLat, data.currentLng], data.mapZoom);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const marker = L.marker([data.currentLat, data.currentLng]).addTo(map).bindPopup(data.currentPlace);
    marker.openPopup();
    setTimeout(() => map.invalidateSize(), 200);

    /* ============ Fullscreen / expand map logic ============ */
    function enterFullscreen(){
      if (mapCard.classList.contains('mapWrapFull')) return;
      mapCard.classList.add('mapWrapFull');
      document.body.style.overflow = 'hidden';
      if (mapCard.requestFullscreen) mapCard.requestFullscreen().catch(()=>{});
      setTimeout(()=>map.invalidateSize(), 120);
    }
    function exitFullscreen(){
      if (!mapCard.classList.contains('mapWrapFull')) return;
      mapCard.classList.remove('mapWrapFull');
      document.body.style.overflow = '';
      if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(()=>{});
      setTimeout(()=>map.invalidateSize(), 120);
    }

    // dblclick for desktop
    mapCard.addEventListener('dblclick', (e)=>{ e.preventDefault(); mapCard.classList.contains('mapWrapFull') ? exitFullscreen() : enterFullscreen(); });

    // double tap for mobile (touch)
    let lastTap = 0;
    mapCard.addEventListener('touchend', (e)=>{
      const now = Date.now();
      if (now - lastTap < 300){
        e.preventDefault();
        mapCard.classList.contains('mapWrapFull') ? exitFullscreen() : enterFullscreen();
      }
      lastTap = now;
    }, { passive:false });

    document.getElementById('mapClose').addEventListener('click', exitFullscreen);
    document.addEventListener('keydown', (e)=>{ if (e.key === 'Escape') exitFullscreen(); });
    document.addEventListener('fullscreenchange', ()=>{
      if (!document.fullscreenElement){
        mapCard.classList.remove('mapWrapFull');
        document.body.style.overflow = '';
        setTimeout(()=>map.invalidateSize(), 120);
      }
    });

    /* ============ Copy phone with fallback ============ */
    async function copyPhone(){
      const text = data.tel;
      try{
        if (navigator.clipboard && window.isSecureContext){
          await navigator.clipboard.writeText(text);
        } else {
          const input = document.createElement('input');
          input.value = text;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
        }
        const btn = document.getElementById('copyBtn'); const old = btn.textContent;
        btn.textContent = 'Скопировано'; setTimeout(()=>btn.textContent = old,1400);
      } catch(e){
        const btn = document.getElementById('copyBtn'); const old = btn.textContent;
        btn.textContent = 'Не удалось'; setTimeout(()=>btn.textContent = old,1400);
      }
    }
    document.getElementById('copyBtn').addEventListener('click', copyPhone);

    /* ============ Parallax micro-move (cheap) ============ */
    const hero = document.querySelector('.hero');
    const glow = document.querySelector('.glow');
    window.addEventListener('mousemove', (e)=>{
      const x = (e.clientX / window.innerWidth - 0.5) * 14;
      const y = (e.clientY / window.innerHeight - 0.5) * 14;
      hero.style.transform = `translate3d(${x * 0.08}px, ${y * 0.08}px, 0)`;
      glow.style.transform = `translate3d(${x * -0.18}px, ${y * -0.18}px, 0) scale(1.02)`;
    }, { passive:true });

    /* ============ Auto-hide sticky panel on scroll (perf-friendly) ============ */
    const sticky = document.getElementById('stickyPanel');
    let lastScrollY = window.scrollY;
    let ticking = false;
    let hidden = false;

    function updateStickyVisibility(){
      const currentScrollY = window.scrollY;
      const delta = currentScrollY - lastScrollY;

      if (currentScrollY < 80){
        sticky.classList.remove('is-hidden'); hidden = false;
      } else if (delta > 6 && !hidden){
        sticky.classList.add('is-hidden'); hidden = true;
      } else if (delta < -6 && hidden){
        sticky.classList.remove('is-hidden'); hidden = false;
      }
      lastScrollY = currentScrollY;
      ticking = false;
    }

    window.addEventListener('scroll', ()=>{
      if (!ticking){ window.requestAnimationFrame(updateStickyVisibility); ticking = true; }
    }, { passive:true });

    /* ============ Small accessibility: respect reduced motion preference ============ */
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      document.documentElement.style.scrollBehavior = 'auto';
    }
  </script>
</body>
</html>
